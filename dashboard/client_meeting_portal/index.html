<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Validación de reuniones · Portal cliente</title>
<link href="https://fonts.googleapis.com/css2?family=Saira:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --gold:#FFD700;--gold-hover:#FFCC00;--carbon:#333333;--ink:#1A1A1A;
  --bg:#FAFAF8;--surface:#FFFFFF;--muted-surface:#F4F4F2;--muted:#6B6B6B;
  --line:#EDECEA;--line-strong:#C9C9C4;--primary:#FFD700;--primary-soft:#FFF7BF;
  --green:#15803D;--green-bg:#EAF6EF;--orange:#A66A00;--orange-bg:#FFF3D8;
  --red:#C92B2B;--red-bg:#FDECEA;--blue:#2563EB;--blue-bg:#EAF1FE;
  --purple:#6D28D9;--purple-bg:#F1EDFF;--gray:#8A8A86;--gray-bg:#F4F4F2;
}
*{box-sizing:border-box}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{margin:0;background:#ECECEA;color:var(--ink);font-family:"IBM Plex Sans",ui-sans-serif,system-ui,sans-serif;font-size:14px}
button,input,select,textarea{font:inherit}
.mockup-banner{background:#1a1a1a;color:#ffd700;padding:9px 16px;font-size:12px;border-bottom:2px solid #ffd700}
.mockup-banner b{color:#fff}
.app{min-width:0;padding:0 12px 24px;background:#ECECEA}
.top{height:64px;display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center;margin-bottom:14px;background:var(--carbon);color:#FFF;border-radius:0 0 10px 10px;padding:0 18px;box-shadow:0 10px 24px rgba(26,26,26,.14);border-top:3px solid var(--gold)}
.brand{display:flex;align-items:center;gap:14px}
.brand-logo{height:34px;width:auto;max-width:150px;object-fit:contain;display:block}
.title h1{font-family:Saira,"IBM Plex Sans",sans-serif;font-size:18px;margin:0;font-weight:700;color:#FFF}
.title p{font-size:12px;margin:2px 0 0;color:#C9C9C6}
.user{font-size:12px;text-align:right;color:#ECECEA;white-space:nowrap}
.user b{display:block;color:#FFF}
.user span{display:block;font-size:11px;color:#C9C9C6;margin-top:2px}
.top-meta{min-width:0;max-width:520px;justify-self:center;width:100%;padding:0 10px}
.top-meta-label{font-size:10px;color:#C9C9C6;text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:5px;line-height:1.2}
.top-meta-row{display:flex;align-items:center;gap:12px}
.top-meta-ratio{font-family:"IBM Plex Mono",monospace;font-size:13px;font-weight:700;color:var(--gold);white-space:nowrap}
.top-meta-bar{flex:1;height:6px;background:#4a4a48;border-radius:99px;overflow:hidden;min-width:100px}
.top-meta-bar .fill{height:100%;background:var(--gold);border-radius:99px}
.top-meta .goal-pill{font-size:10px;font-weight:800;background:rgba(255,215,0,.14);color:var(--gold);border-radius:6px;padding:3px 8px;white-space:nowrap}
.layout{display:grid;grid-template-columns:1fr;gap:12px;align-items:start}
.layout.open{grid-template-columns:minmax(0,1fr) minmax(430px,34vw)}
.layout.open .main{min-width:0;overflow:hidden}
.main{display:flex;flex-direction:column;gap:12px;min-width:0}
.card{background:var(--surface);border:1px solid #D8D8D5;border-radius:10px;box-shadow:0 8px 20px rgba(26,26,26,.05)}
.filters{padding:14px;display:grid;grid-template-columns:2fr .8fr .8fr 1.35fr .7fr;gap:10px;background:#FAFAF8;border-radius:10px}
.extra{display:none;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 14px 14px;background:#FAFAF8}
.extra.open{display:grid}
.field{height:38px;border:1px solid #D8D8D5;border-radius:9px;background:#FFF;display:flex;align-items:center;gap:8px;padding:0 11px;position:relative;min-width:0}
.field label{position:absolute;top:-8px;left:9px;background:#FFF;font-size:10px;color:#6B6B6B;font-weight:700;padding:0 4px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select{border:0;outline:0;background:transparent;width:100%;height:100%;font-size:12px;color:var(--ink)}
.field button{border:0;background:transparent;width:100%;height:100%;font-weight:700;font-size:12px;cursor:pointer}
.date-range{display:grid;grid-template-columns:1fr 1fr auto;gap:4px;align-items:center}
.date-range input{font-family:"IBM Plex Mono",monospace;font-size:11px}
.clear-date{border:0;background:transparent;color:var(--muted);cursor:pointer}
.quick-dates{display:flex;align-items:center;gap:7px;padding:0 14px 12px;background:#FAFAF8;flex-wrap:wrap}
.quick-dates .qd-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.quick-dates button{border:1px solid #D8D8D5;background:#fff;border-radius:999px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer}
.quick-dates button:hover{border-color:var(--gold);background:#fffdf0}
.qd-status{display:inline-flex;gap:7px;flex-wrap:wrap;align-items:center}
.qd-chip{display:inline-flex;align-items:center;gap:7px;border:1px solid #D8D8D5;background:#fff;border-radius:999px;padding:5px 12px;font:600 11px "IBM Plex Sans",sans-serif;cursor:pointer}
.qd-chip:before{content:"";width:8px;height:8px;border-radius:99px;background:var(--dot,#9A9A98)}
.qd-chip.orange{--dot:#92610A}.qd-chip.blue{--dot:#2563EB}.qd-chip.green{--dot:#15803D}.qd-chip.red{--dot:#C0392B}
.qd-chip.on{border-color:var(--dot);background:#FFFBEF}
.qd-clear{margin-left:auto;border:1px solid #D8D8D5;background:#fff;border-radius:999px;padding:5px 12px;font:600 11px;cursor:pointer}
.active-filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:0 12px 12px}
.filter-chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--muted-surface);border-radius:999px;padding:5px 8px;font-size:11px}
.filter-chip button{border:0;background:transparent;cursor:pointer;color:var(--muted)}
.progress{padding:16px 18px;background:#FAFAF8}
.actions-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.review-form{border:1px solid var(--line);border-radius:9px;padding:12px;background:#fafaf8;margin-top:10px}
.section-head b{font-family:Saira,"IBM Plex Sans",sans-serif;font-size:15px}
.save-bar{margin-top:12px;padding-top:10px;border-top:1px solid var(--line)}
.draft-hint{font-size:11px;color:var(--orange);font-weight:700;margin-top:6px}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);overflow:hidden}
.kpi{min-height:74px;padding:10px 12px;border-right:1px solid var(--line);display:flex;gap:10px;align-items:center;cursor:pointer}
.kpi:last-child{border-right:0}
.kpi.active{box-shadow:inset 0 -3px 0 var(--gold);background:#fffdf0}
.ico{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:11px}
.ico.blue{background:var(--blue-bg);color:var(--blue)}
.ico.green{background:var(--green-bg);color:var(--green)}
.ico.orange{background:var(--orange-bg);color:var(--orange)}
.ico.purple{background:var(--purple-bg);color:var(--purple)}
.ico.red{background:var(--red-bg);color:var(--red)}
.kpi span{display:block;font-size:11px;font-weight:700}
.kpi b{display:block;font-family:"IBM Plex Mono",monospace;font-size:24px;line-height:1.1;margin-top:2px}
.kpi small{display:block;font-size:10.5px;color:var(--muted);margin-top:4px}
.table-head{padding:11px 14px 7px}
.table-head h2{font-family:Saira,"IBM Plex Sans",sans-serif;font-size:14px;margin:0}
.table-head p{font-size:11px;color:var(--muted);margin:3px 0 0}
.table-wrap{overflow:auto;max-height:560px;border-top:1px solid var(--line)}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px}
thead th{position:sticky;top:0;z-index:6;background:var(--muted-surface);border-bottom:1px solid var(--line);text-align:left;color:#9A9A98;font-family:Saira,"IBM Plex Sans",sans-serif;font-size:11px;font-weight:600;padding:6px 10px;white-space:nowrap;text-transform:uppercase;letter-spacing:.05em}
.sort,.quick{border:0;background:transparent;color:inherit;font-weight:600;cursor:pointer;padding:0;font-family:Saira,"IBM Plex Sans",sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.quick.active{color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:6px;padding:0 5px;text-transform:none}
tbody td{border-bottom:1px solid var(--line);padding:6px 10px;vertical-align:middle;white-space:nowrap;height:38px}
tbody tr{cursor:pointer}
tbody tr:hover{background:#FFF9D6}
tbody tr.selected{box-shadow:inset 4px 0 0 var(--gold);background:#FFF7D0}
.sub{display:block;color:var(--muted);font-size:10.5px;margin-top:2px}
.company{font-weight:600}
.chip,.pill{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:6px;padding:5px 9px;min-width:96px;font-size:.72rem;font-weight:600;border:1px solid transparent}
.chip:before,.pill:before{content:"";width:6px;height:6px;border-radius:99px;background:currentColor}
.pill{appearance:none;outline:0;cursor:pointer}
.pill.readonly{cursor:default}
.green{background:var(--green-bg);color:var(--green)}
.orange{background:var(--orange-bg);color:var(--orange)}
.red{background:var(--red-bg);color:var(--red)}
.purple{background:var(--purple-bg);color:var(--purple)}
.blue{background:var(--blue-bg);color:var(--blue)}
.gray{background:var(--gray-bg);color:var(--gray)}
.row-actions{display:inline-flex;gap:4px}
.act-eye{border:1px solid var(--line);background:#fff;border-radius:7px;width:30px;height:28px;cursor:pointer;display:grid;place-items:center}
.act-eye:hover{border-color:var(--gold);background:#fffdf0}
.drawer{padding:0;position:sticky;top:10px;display:flex;flex-direction:column}
.drawer.hidden{display:none}
.drawer-fixed{flex:0 0 auto;padding:10px 14px 0;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
.close{position:absolute;right:8px;top:3px;border:0;background:transparent;font-size:20px;cursor:pointer;z-index:6}
.detail-band{display:flex;flex-wrap:wrap;gap:12px 18px;align-items:center;border:1px solid #FFE6A3;background:#FFF7D0;border-radius:8px;padding:10px 28px 10px 12px;margin-bottom:12px}
.band-main{min-width:190px;flex:1.25 1 190px;padding-right:8px}
.band-title b{display:block;font-family:Saira,"IBM Plex Sans",sans-serif;font-size:15px;line-height:1.15;font-weight:700}
.band-title span{display:block;margin-top:4px;color:var(--muted);font-size:12px;line-height:1.25}
.band-item{min-width:118px;flex:0 0 auto;margin-left:auto;text-align:right}
.band-item small{display:block;color:var(--muted);font-size:10px;line-height:1.05;text-transform:uppercase;letter-spacing:.04em;font-weight:700}
.band-item b{display:block;margin-top:3px;font-size:13px;font-weight:700;line-height:1.2}
.summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:0 0 18px}
.sum{border:1px solid var(--line);border-radius:8px;padding:11px 12px;background:#fff;text-align:left;cursor:pointer;font:inherit;color:var(--ink)}
.sum:hover{border-color:var(--gold);background:#fffdf0}
.sum.final-state{border-color:var(--gold);background:var(--primary-soft)}
.sum small{display:block;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:8px;letter-spacing:.03em;line-height:1.1}
.sum .chip{min-width:0;width:100%;padding:7px 9px;font-size:12px;justify-content:flex-start;line-height:1.15}
.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:0;background:#F6F6F4;border:1px solid var(--line);border-radius:8px;margin:0 0 18px;overflow:hidden}
.tabs button{border:0;border-bottom:2px solid transparent;background:transparent;padding:12px 4px 11px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;line-height:1.15}
.tabs button.active{color:var(--ink);background:#fff;border-bottom-color:var(--gold)}
.panel{padding:0 20px 20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 6px}
.field2 label{display:block;font-size:10px;color:var(--muted);font-weight:700;margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}
.field2 input,.field2 select,.field2 textarea{width:100%;border:1px solid var(--line);border-radius:7px;background:var(--surface);min-height:30px;padding:5px 8px;font-size:13px;outline:0;line-height:1.35}
.field2 textarea{min-height:56px;resize:vertical}
.field2 input[readonly],.field2 textarea[readonly]{background:#FAFAF8;color:var(--muted)}
.wide{grid-column:1/-1}
.co-head{margin-bottom:16px}
.co-head b{display:block;font-size:17px;font-weight:700;line-height:1.2}
.co-head span{display:block;color:var(--muted);font-size:12px;margin-top:4px;line-height:1.4}
.co-section{border-top:1px solid var(--gold);padding:16px 0 10px}
.co-section summary{display:flex;align-items:center;gap:12px;cursor:pointer;list-style:none;margin-bottom:12px}
.co-section summary::-webkit-details-marker{display:none}
.co-icon{width:36px;height:36px;border-radius:7px;background:var(--primary-soft);display:grid;place-items:center;color:#7A6400;font-weight:800}
.co-title b{display:block;font-size:14px;font-weight:700;line-height:1.2}
.co-title span{display:block;color:var(--muted);font-size:11px;margin-top:2px;line-height:1.35}
.co-chevron{margin-left:auto;font-weight:800}
.block-title{display:block;font-family:Saira,"IBM Plex Sans",sans-serif;font-size:12px;font-weight:700;margin:10px 0 6px;color:var(--ink)}
.link-field{display:flex;align-items:center;gap:8px}
.link-field input{flex:1;min-width:0}
.open-link{color:var(--blue);font-weight:700;text-decoration:none;font-size:12px;white-space:nowrap}
.open-link:hover{text-decoration:underline}
.just-box{border:1px solid var(--line);border-radius:9px;padding:9px 10px;background:#fff;font-size:13px;line-height:1.45;margin-top:8px}
.just-box b{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:5px}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:7px}
.primary,.ghost{border-radius:9px;padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer}
.primary{border:0;background:var(--gold);color:var(--ink)}
.ghost{border:1px dashed var(--line-strong);background:#fff;color:var(--carbon)}
.read{border:1px solid var(--line);border-radius:9px;padding:10px 12px;background:#fff;font-size:13px;line-height:1.45}
.read p{margin:5px 0}
.bant-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:6px}
.bant-item{border:1px solid #86efac;border-radius:7px;padding:7px 8px;font-size:12px;font-weight:700;text-align:center;line-height:1.3;background:var(--green-bg);color:var(--green)}
.evidence{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.evi{border:1px solid var(--line);border-radius:8px;padding:7px;background:#fff;font-size:12px;font-weight:600}
.evi a{color:var(--carbon);text-decoration:underline;text-decoration-color:var(--gold)}
.history{border-left:2px solid var(--line);padding-left:10px;margin-left:5px}
.hist{position:relative;margin-bottom:6px}
.hist:before{content:"";position:absolute;left:-15px;top:3px;width:7px;height:7px;border-radius:99px;background:var(--gold)}
.hist small{color:var(--muted);font-size:11px;line-height:1.3}
.hist b{display:block;font-size:13px;font-weight:600;margin:2px 0 1px}
.hist div{font-size:12px;line-height:1.4;color:var(--ink)}
.save-note{position:fixed;right:24px;bottom:18px;background:var(--carbon);color:#fff;border-radius:8px;padding:10px 12px;font-size:12px;font-weight:600;z-index:20;box-shadow:0 8px 24px rgba(26,26,26,.22)}
.layout.open .kpis{grid-template-columns:repeat(3,1fr)}
.layout.open .kpi{min-height:66px;padding:8px 10px}
.layout.open .kpi b{font-size:21px}
.layout.open table{font-size:10.6px}
.layout.open thead th,.layout.open tbody td{padding:5px 5px}
.layout.open .pill{min-width:0;width:100%;padding:4px 5px;font-size:10.2px}
.layout.open tbody tr.selected{background:#FFF7D0;box-shadow:inset 4px 0 0 var(--gold),inset 0 0 0 1px #F0D28D}
.layout.open .band-title b{max-width:170px;font-size:14px}
.layout.open .band-title span{max-width:170px;font-size:11px}
.layout.open .band-item b{font-size:12px}
.layout.open .sum small{font-size:9px}
.layout.open .sum .chip{font-size:11px;padding:6px 8px}
.layout.open .tabs button{font-size:11px;padding:10px 3px 9px}
.layout.open .field2 label{font-size:9px}
.layout.open .field2 input,.layout.open .field2 textarea,.layout.open .field2 select{font-size:12px}
.layout.open .co-head b{font-size:16px}
.layout.open .co-title b{font-size:13px}
@media(max-width:1100px){.layout.open{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">
      <img class="brand-logo" src="__BRAND_MARK__" alt="Conprospección">
      <div class="title"><h1>__PORTAL_TITLE__</h1><p>__PORTAL_BRAND__</p></div>
    </div>
    <div class="top-meta">
      <div class="top-meta-label">Avance de meta (acumulado)</div>
      <div class="top-meta-row">
        <span class="top-meta-ratio" id="metaRatio">0 / 0</span>
        <div class="top-meta-bar"><div class="fill" id="metaFill" style="width:0%"></div></div>
        <span class="goal-pill" id="metaPill">0%</span>
      </div>
    </div>
    <div class="user"><b>__PORTAL_USER__</b><span>__PORTAL_SUBTITLE__</span></div>
  </header>
  <div class="layout" id="layout">
    <main class="main">
      <section class="card">
        <div class="filters">
          <div class="field"><span>🔍</span><input id="q" placeholder="Buscar empresa, contacto, cargo, correo..." oninput="setFilter('q',this.value)"></div>
          <div class="field"><label>Mes</label><select id="fMonth" onchange="setFilter('month',this.value)"></select></div>
          <div class="field"><label>Año</label><select id="fYear" onchange="setFilter('year',this.value)"></select></div>
          <div class="field date-range"><label>Rango de fechas</label><input id="fDateFrom" type="date" onchange="setFilter('dateFrom',this.value)"><input id="fDateTo" type="date" onchange="setFilter('dateTo',this.value)"><button class="clear-date" onclick="resetDateRange()">×</button></div>
          <div class="field"><button id="moreBtn" onclick="toggleMore()">Más filtros</button></div>
        </div>
        <div class="quick-dates">
          <span class="qd-label">Rápido:</span>
          <button onclick="setToday()">Hoy</button>
          <button onclick="setThisWeek()">Esta semana</button>
          <button onclick="resetDateRange()">Este mes</button>
          <span id="quickStatus" class="qd-status"></span>
          <button class="qd-clear" onclick="clearAll()">↻ Limpiar filtros</button>
        </div>
        <div class="extra" id="extraFilters">
          <div class="field"><label>Etapa Agenda</label><select id="fStatus" onchange="setFilter('status',this.value)"></select></div>
          <div class="field"><label>Evaluación CP</label><select id="fCp" onchange="setFilter('cp',this.value)"></select></div>
          <div class="field"><label>Evaluación Cliente</label><select id="fClientVal" onchange="setFilter('clientVal',this.value)"></select></div>
          <div class="field"><label>Estado Final</label><select id="fFinal" onchange="setFilter('final',this.value)"></select></div>
        </div>
        <div class="active-filters" id="activeFilters"></div>
      </section>
      <section class="card kpis" id="kpis"></section>
      <section class="card">
        <div class="table-head"><h2>Seguimiento de reuniones</h2><p>Confirma o solicita revisión desde el panel lateral → pestaña Evaluación Cliente.</p></div>
        <div class="table-wrap"><table><thead id="thead"></thead><tbody id="rows"></tbody></table></div>
      </section>
    </main>
    <aside class="card drawer hidden" id="drawer">
      <div class="drawer-fixed">
        <button class="close" onclick="closeDetail()" aria-label="Cerrar">×</button>
        <div class="detail-band" id="detailBand"></div>
        <div class="summary" id="summary"></div>
        <div class="tabs" id="tabs"></div>
      </div>
      <div class="panel" id="panel"></div>
    </aside>
  </div>
</div>
<script>

function streamlitSend(type,data={}){window.parent.postMessage({isStreamlitMessage:true,type,...data},"*")}
function componentReady(){streamlitSend("streamlit:componentReady",{apiVersion:1})}
function setComponentValue(value){streamlitSend("streamlit:setComponentValue",{value,dataType:"json"})}
function setComponentHeight(){streamlitSend("streamlit:setFrameHeight",{height:Math.max(900,document.documentElement.scrollHeight)})}
componentReady();window.addEventListener("load",()=>setTimeout(setComponentHeight,100));window.addEventListener("resize",setComponentHeight);

const CLIENT_GOAL = __CLIENT_GOAL__;
const statuses = ["Reunión futura","Reunión realizada","Reunión cancelada","Reagendar reunión"];
const cps = ["","Pendiente","Válida","No válida","No necesaria"];
const clientVals = ["","Pendiente","Válida","No válida","Solicita revisión","No necesaria"];
const clientValsEditable = ["Pendiente","Válida","Solicita revisión"];
const finalOptions = ["Pendiente","Reunión válida","Reunión no válida","Reunión cancelada","Reagendar reunión"];

function clearFilter(k) {

  else filters[k] = k === "q" ? "" : "Todos";

function toggleFilter(k, v) { filters[k] = filters[k] === v ? "Todos" : v; }
function applyFilters() {
  return meetings.filter(m => {
    const hay = `${m.company} ${m.contact} ${m.role} ${m.email||""}`.toLowerCase();
    const md = parseDate(m.date);
    if (filters.q && !hay.includes(filters.q.toLowerCase())) return false;
    if (filters.dateFrom && md < filters.dateFrom) return false;
    if (filters.dateTo && md > filters.dateTo) return false;
    if (filters.status !== "Todos" && m.status !== filters.status) return false;
    if (filters.cp !== "Todos" && m.cp !== filters.cp) return false;
    if (filters.clientVal !== "Todos" && m.clientVal !== filters.clientVal) return false;

}
function sortRows(rows) {

  return [...rows].sort((a,b) => {
    const av = sortState.key === "dateTime" ? dtValue(a) : String(a[sortState.key] || finalStatus(a));
    const bv = sortState.key === "dateTime" ? dtValue(b) : String(b[sortState.key] || finalStatus(b));
    return av > bv ? dir : av < bv ? -dir : 0;
  });
}

  document.getElementById("detailBand").innerHTML = `
    <div class="band-main"><div class="band-title"><b>${esc(m.company)}</b><span>${esc(m.contact)} · ${esc(m.role)}</span></div></div>
    <div class="band-item"><small>Fecha y hora</small><b>${esc(m.date)} ${esc(m.time)}</b></div>`;
  const states = [["Etapa Agenda",m.status,"","Información"],["Evaluación CP",m.cp,"","Evaluación CP"],["Evaluación Cliente",hasUnsavedClientDraft(m)?getDraftClientVal(m):m.clientVal,"","Evaluación Cliente"],["Estado Final",finalDisplay(m),"final-state","Estado Final"]];
  document.getElementById("summary").innerHTML = states.map(i =>
    `<button class="sum ${i[2]}" onclick="tab='${i[3]}';renderPanel()"><small>${i[0]}</small><span class="chip ${tone(i[1])}">${esc(i[1])}</span></button>`
  ).join("");
  const tabs = ["Información","Evaluación CP","Evaluación Cliente","Estado Final","Historial"];
  document.getElementById("tabs").innerHTML = tabs.map(t =>
    `<button class="${tab===t?"active":""}" onclick="tab='${t}';renderPanel()">${t}</button>`
  ).join("");
  let html = "";
  if (tab === "Información") html = infoTab(m);
  if (tab === "Evaluación CP") html = cpTab(m);
  if (tab === "Evaluación Cliente") html = clientTab(m);
  if (tab === "Estado Final") html = finalTab(m);
  if (tab === "Historial") html = historyTab(m);
  document.getElementById("panel").innerHTML = html;
}
function renderMeta() {
  // Meta ACUMULADA (igual que el panel interno): cuenta TODAS las validas de
  // GBS (todos los meses), independiente de los filtros de la tabla. GBS es de
  // contrato, asi que el avance suma sin reiniciar.
  const valid = meetings.filter(m => finalStatus(m) === "Reunión válida").length;
  const goal = CLIENT_GOAL || 0;
  const p = goal ? Math.round(valid / goal * 100) : 0;
  const ratio = document.getElementById("metaRatio");
  const fill = document.getElementById("metaFill");
  const pill = document.getElementById("metaPill");
  if (ratio) ratio.textContent = `${valid} / ${goal}`;
  if (fill) fill.style.width = Math.min(p, 100) + "%";
  if (pill) pill.textContent = p + "%";
}
function render() {
  const rows = applyFilters();
  document.getElementById("layout").classList.toggle("open", panelOpen);
  document.getElementById("drawer").classList.toggle("hidden", !panelOpen);
  renderFilters(rows);
  renderQuickStatus();
  renderKpis(rows);
  renderMeta();
  renderHead();
  renderRows(rows);
  if (panelOpen) renderPanel();
  // Reajustar el alto del iframe tras cada render para que, al abrir el panel
  // de detalle (más alto), no se corte el contenido y se pueda ver todo.
  setTimeout(setComponentHeight, 50);
}
render();
</script>
</body>
